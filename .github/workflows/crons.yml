name: Scheduled crons

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  daily-alerts:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call daily-alerts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://pvai-prod.vercel.app/api/cron/daily-alerts

  proactive-alerts:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Call proactive-alerts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://pvai-prod.vercel.app/api/cron/proactive-alerts
